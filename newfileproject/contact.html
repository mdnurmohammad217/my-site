    <style>
        .bangla-font {

        /* 🔥 Animated Gradient */
        .animated-bg {
            background: linear-gradient(-45deg, #1e3a8a, #4f46e5, #0ea5e9, #1e40af);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 🔥 Glow Button */
        .glow-btn {
            position: relative;
        }

        .glow-btn::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #00f5a0, #00d9f5, #00f5a0);
            border-radius: 10px;
            z-index: -1;
            filter: blur(8px);
            opacity: 0.7;
        }
    </style>
