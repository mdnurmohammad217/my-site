<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-gray-100 h-screen">

    <div id="header"></div>


<!-- Top Section -->
    <section class="top-section">
        <div class="bg-gradient-to-l from-[#053700] via-green-700 to-[#053700] py-16 px-6">
            <div class="max-w-5xl mx-auto text-center">
                <h2 class="md:text-5xl text-4xl font-semibold mb-6 text-white bangla-font">ল্যান্ডিং পেজ কি?</h2>
                <p class="text-base text-slate-300 bangla-font text-xl">একটি কিংবা একদম সিমিলার ২-৩ টি প্রোডাক্ট যারা সেল করে থাকে তাদের জন্য ল্যান্ডিং পেজ গুরুত্বপূর্ণ। খরচের পরিমাণ কম কিন্তু সেল অনেক বেশি।</p>

                


            </div>
        </div>
    </section>


    <div id="footer"></div>
    <script type="text/babel" src="main.js"></script>
</body>

</html>
