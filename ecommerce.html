<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-gray-100 h-screen">

    <div id="header"></div>
    
<!-- Top Section -->
    <section class="top-section">
        <div class="bg-gradient-to-l from-[#053700] via-green-700 to-[#053700] py-16 px-6">
            <div class="max-w-5xl mx-auto text-center">
                <h2 class="md:text-5xl text-4xl font-semibold mb-6 text-white bangla-font">ই-কমার্স ওয়েবসাইট সুপারফাস্ট ও ফাংশনাল না হলে বিজনেস করা ইমপসিবল</h2>
                <p class="text-base text-yellow-500 bangla-font text-xl">বেশি সেল জেনারেট করতে এমন একটি ওয়েবসাইট ডেভেলপ করে নিন</p>

                <div class="flex items-center border pl-4 gap-2 bg-white border-gray-500/30 h-[46px] rounded-full overflow-hidden max-w-md w-full mx-auto mt-2">

                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" fill="#6B7280">
                        <path
                            d="M13 3C7.489 3 3 7.489 3 13s4.489 10 10 10a9.95 9.95 0 0 0 6.322-2.264l5.971 5.971a1 1 0 1 0 1.414-1.414l-5.97-5.97A9.95 9.95 0 0 0 23 13c0-5.511-4.489-10-10-10m0 2c4.43 0 8 3.57 8 8s-3.57 8-8 8-8-3.57-8-8 3.57-8 8-8" />
                    </svg>

                    <input type="text" class="w-full h-full outline-none text-sm text-gray-500">

                    <button type="submit"
                        class="bg-indigo-500 w-32 h-9 rounded-full text-sm text-white mr-[5px]">Search</button>
                </div>


            </div>
        </div>
    </section>


    <div id="footer"></div>
    <script type="text/babel" src="main.js"></script>
</body>

</html>
