<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind Css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Bangla:ital@0;1&display=swap"
        rel="stylesheet">
    <!-- site Icon -->
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Site Ghor</title>
</head>

<body>
    <div id="header"></div>

    
<!-- Top Section -->
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&display=swap" rel="stylesheet">

    <style>
        .bangla-font {
            font-family: 'Tiro Bangla', sans-serif;
        }

        /* 🔥 Animated Gradient */
        .animated-bg {
            background: linear-gradient(-45deg, #1e3a8a, #4f46e5, #0ea5e9, #1e40af);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 🔥 Glow Button */
        .glow-btn {
            position: relative;
        }

        .glow-btn::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #00f5a0, #00d9f5, #00f5a0);
            border-radius: 10px;
            z-index: -1;
            filter: blur(8px);
            opacity: 0.7;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            AOS.init({ duration: 1000, once: true });
        });
    </script>

    <!-- HERO -->
    <section class="animated-bg text-white py-24 pt-28 text-center relative overflow-hidden">

        <h1 data-aos="fade-up" class="text-4xl md:text-5xl font-bold mb-4">
            Contact - US
        </h1>

       

    </section>


  

    <div id="footer"></div>
    <script src="main.js"></script>
    
</body>
</html>
