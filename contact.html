<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind Css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Bangla:ital@0;1&display=swap"
        rel="stylesheet">
    <!-- site Icon -->
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Site Ghor</title>
</head>

<body>
    <div id="header"></div>

  <style>
    :root {
      --gold-light:  #f5d17a;
      --gold:        #d4a832;
      --gold-deep:   #a07820;
      --gold-bright: #ffe39a;
      --bg-dark:     #0b0900;
      --bg-card:     #110e00;
      --text-light:  #fef6e4;
      --text-muted:  #c9a85c;
    }

    body {
      background: var(--bg-dark);
      font-family: 'Hind Siliguri', sans-serif;

    }

    /* ─── Noise / grain overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    section {
      position: relative;
      overflow: hidden;
      padding: 100px 20px;
      z-index: 1;
    }

    /* ─── Decorative orbs ─── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .orb-1 { width: 340px; height: 340px; background: radial-gradient(circle, #c8860a55, transparent 70%); top: -60px; left: -80px; }
    .orb-2 { width: 260px; height: 260px; background: radial-gradient(circle, #d4a83228, transparent 70%); bottom: 20px; right: -50px; }
    .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, #f5d17a18, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

    /* ─── Decorative horizontal rule ─── */
    .divider-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 14px;
      max-width: 300px;
      opacity: 0.6;
    }

    /* ─── Badge ─── */
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 32px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 22px;
      border: 1px solid #c8860a66;
      border-radius: 999px;
      background: linear-gradient(135deg, #1a1200cc, #2a1d00cc);
      backdrop-filter: blur(12px);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
    }
    .badge-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px var(--gold); }
      50%       { box-shadow: 0 0 16px var(--gold-light); }
    }

    /* ─── Heading ─── */
    .heading-wrap { text-align: center; margin-bottom: 70px; }
    .heading-wrap h2 {
      
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-bright) 10%, var(--gold) 50%, var(--gold-deep) 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .heading-rule {
      margin: 18px auto 20px;
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .heading-wrap p {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ─── Grid ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      max-width: 960px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .card-full  { grid-column: 1 / -1; }
    }

    /* ─── Card base ─── */
    .card-outer {
      position: relative;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, #d4a83288, #7a5c1a55, #d4a83244);
      box-shadow: 0 8px 40px #00000066, 0 0 0 1px #c8860a22;
      transition: transform 0.4s cubic-bezier(.22,1,.36,1), box-shadow 0.4s;
    }
    .card-outer:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px #00000099, 0 0 30px #d4a83222;
    }
    .card-inner {
      position: relative;
      border-radius: 27px;
      background: linear-gradient(145deg, #181100, #0e0b00);
      overflow: hidden;
      padding: 34px 30px;
    }

    /* inner shimmer */
    .card-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, #d4a83210, transparent 60%);
      pointer-events: none;
    }

    /* ─── Card type colours ─── */
    .card-primary .card-icon-bg  { background: linear-gradient(135deg, #2a5c2a, #1a3d1a); box-shadow: 0 0 20px #22c55e33; }
    .card-primary .card-icon-bg svg { color: #6ee7a0; }
    .card-primary .line-accent   { background: linear-gradient(90deg, #22c55e, transparent); }

    .card-support .card-icon-bg  { background: linear-gradient(135deg, #1a2a5c, #0d1a3d); box-shadow: 0 0 20px #6366f133; }
    .card-support .card-icon-bg svg { color: #a5b4fc; }
    .card-support .line-accent   { background: linear-gradient(90deg, #6366f1, transparent); }

    .card-emergency .card-icon-bg { background: linear-gradient(135deg, #5c1a1a, #3d0d0d); box-shadow: 0 0 20px #ef444433; }
    .card-emergency .card-icon-bg svg { color: #fca5a5; }
    .card-emergency .line-accent  { background: linear-gradient(90deg, #ef4444, transparent); }

    /* ─── Card content ─── */
    .card-header { display: flex; align-items: center; gap: 18px; }

    .card-icon-bg {
      flex-shrink: 0;
      width: 68px; height: 68px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .card-icon-bg svg { width: 30px; height: 30px; }

    .card-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .card-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.04em;
    }

    .line-accent {
      height: 1px;
      margin: 22px 0;
      opacity: 0.4;
    }

    /* ─── Buttons ─── */
    .btn-group { display: flex; flex-wrap: wrap; gap: 12px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s ease;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
    }
    .btn-call {
      background: linear-gradient(135deg, var(--gold-deep), var(--gold));
      color: #0b0900;
      box-shadow: 0 4px 20px #d4a83244;
    }
    .btn-call:hover {
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      box-shadow: 0 6px 30px #d4a83266;
      transform: translateY(-1px);
    }
    .btn-wa {
      background: #ffffff0d;
      color: var(--gold-light);
      border: 1px solid #d4a83240;
    }
    .btn-wa:hover {
      background: #d4a83215;
      border-color: var(--gold);
      box-shadow: 0 0 14px #d4a83222;
    }
    .btn svg { width: 17px; height: 17px; }

    /* ─── Corner ornament ─── */
    .corner-ornament {
      position: absolute;
      top: 18px; right: 22px;
      opacity: 0.06;
      pointer-events: none;
    }
    .corner-ornament svg { width: 80px; height: 80px; color: var(--gold-light); }

    /* ─── Gold rule between badge & heading ─── */
    .ornament-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .ornament-line span { color: var(--gold); font-size: 1.2rem; opacity: 0.7; }
    .ornament-line hr { width: 50px; border: none; height: 1px; background: var(--gold); opacity: 0.3; }
  </style>

<section>
