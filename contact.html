<style>
  /* ══════════════════════════════════════════
     সব CSS শুধু .csx-section এর ভেতরে scoped
     body, html, * কোনো global selector নেই
     অন্য section এর design নষ্ট হবে না
  ══════════════════════════════════════════ */

  .csx-section {
    position: relative;
    overflow: hidden;
    padding: 80px 20px;
    background: #0b0900;
    font-family: 'Hind Siliguri', sans-serif;
  }

  /* grain overlay — শুধু section এর ভেতরে */
  .csx-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.45;
  }

  /* ── Decorative orbs ── */
  .csx-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .csx-orb-1 { width: 340px; height: 340px; background: radial-gradient(circle, #c8860a55, transparent 70%); top: -60px; left: -80px; }
  .csx-orb-2 { width: 260px; height: 260px; background: radial-gradient(circle, #d4a83228, transparent 70%); bottom: 20px; right: -50px; }
  .csx-orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, #f5d17a18, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

  .csx-inner {
    position: relative;
    z-index: 1;
  }

  /* ── Badge ── */
  .csx-badge-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
  .csx-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 22px;
    border: 1px solid #c8860a66;
    border-radius: 999px;
    background: linear-gradient(135deg, #1a1200cc, #2a1d00cc);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f5d17a;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
  }
  .csx-badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d4a832;
    animation: csx-pulse-dot 2s ease-in-out infinite;
  }

  /* ── Heading ── */
  .csx-heading-wrap { text-align: center; margin-bottom: 60px; }
  .csx-heading-wrap h2 {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4.6rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ffe39a 10%, #d4a832 50%, #a07820 90%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
  }
  .csx-heading-rule {
    margin: 0 auto 16px;
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, #d4a832, transparent);
  }
  .csx-heading-wrap p {
    color: #c9a85c;
    font-size: 1rem;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.7;
  }
  .csx-ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 16px;
  }
  .csx-ornament span { color: #d4a832; font-size: 1.1rem; opacity: 0.7; }
  .csx-ornament hr { width: 50px; border: none; height: 1px; background: #d4a832; opacity: 0.3; margin: 0; }

  /* ── Grid ── */
  .csx-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 940px;
    margin: 0 auto;
  }
  @media (min-width: 768px) {
    .csx-grid { grid-template-columns: 1fr 1fr; }
    .csx-card-full { grid-column: 1 / -1; }
  }

  /* ── Card ── */
  .csx-card-outer {
    position: relative;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(135deg, #d4a83288, #7a5c1a55, #d4a83244);
    box-shadow: 0 8px 40px #00000066, 0 0 0 1px #c8860a22;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1), box-shadow 0.4s;
  }
  .csx-card-outer:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px #00000099, 0 0 30px #d4a83222;
  }
  .csx-card-inner {
    position: relative;
    border-radius: 27px;
    background: linear-gradient(145deg, #181100, #0e0b00);
    overflow: hidden;
    padding: 32px 28px;
  }
  .csx-card-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, #d4a83210, transparent 60%);
    pointer-events: none;
  }

  /* ── Icon box ── */
  .csx-card-header { display: flex; align-items: center; gap: 18px; }
  .csx-icon-box {
    flex-shrink: 0;
    width: 66px; height: 66px;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .csx-icon-box svg { width: 28px; height: 28px; }

  /* ── Icon infinite float + glow animations ── */
  @keyframes csx-icon-float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50%       { transform: translateY(-5px) scale(1.07); }
  }
  @keyframes csx-glow-green {
    0%, 100% { box-shadow: 0 0 12px #22c55e33; }
    50%       { box-shadow: 0 0 30px #22c55e77, 0 0 55px #22c55e22; }
  }
  @keyframes csx-glow-blue {
    0%, 100% { box-shadow: 0 0 12px #6366f133; }
    50%       { box-shadow: 0 0 30px #6366f177, 0 0 55px #6366f122; }
  }
  @keyframes csx-glow-red {
    0%, 100% { box-shadow: 0 0 12px #ef444433; }
    50%       { box-shadow: 0 0 30px #ef444477, 0 0 55px #ef444422; }
  }
  @keyframes csx-pulse-dot {
    0%, 100% { box-shadow: 0 0 6px #d4a832; }
    50%       { box-shadow: 0 0 18px #f5d17a; }
  }

  .csx-icon-green {
    background: linear-gradient(135deg, #2a5c2a, #1a3d1a);
    animation: csx-icon-float 3s ease-in-out infinite,
               csx-glow-green 3s ease-in-out infinite;
  }
  .csx-icon-green svg { color: #6ee7a0; }

  .csx-icon-blue {
    background: linear-gradient(135deg, #1a2a5c, #0d1a3d);
    animation: csx-icon-float 3.4s ease-in-out infinite,
               csx-glow-blue 3.4s ease-in-out infinite;
    animation-delay: 0.5s;
  }
  .csx-icon-blue svg { color: #a5b4fc; }

  .csx-icon-red {
    background: linear-gradient(135deg, #5c1a1a, #3d0d0d);
    animation: csx-icon-float 2.8s ease-in-out infinite,
               csx-glow-red 2.8s ease-in-out infinite;
    animation-delay: 0.25s;
  }
  .csx-icon-red svg { color: #fca5a5; }

  /* ── Card text ── */
  .csx-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.63rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c9a85c;
    margin-bottom: 4px;
  }
  .csx-number {
    
    font-size: 1.65rem;
    font-weight: 700;
    color: #ffe39a;
    letter-spacing: 0.04em;
  }

  /* ── Divider lines ── */
  .csx-line { height: 1px; margin: 20px 0; opacity: 0.4; }
  .csx-line-green  { background: linear-gradient(90deg, #22c55e, transparent); }
  .csx-line-blue   { background: linear-gradient(90deg, #6366f1, transparent); }
  .csx-line-red    { background: linear-gradient(90deg, #ef4444, transparent); }

  /* ── Corner ornament ── */
  .csx-corner {
    position: absolute;
    top: 18px; right: 20px;
    opacity: 0.05;
    pointer-events: none;
    color: #f5d17a;
  }
  .csx-corner svg { width: 78px; height: 78px; }

  /* ── Buttons ── */
  .csx-btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .csx-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .csx-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .csx-btn-call {
    background: linear-gradient(135deg, #a07820, #d4a832);
    color: #0b0900;
    box-shadow: 0 4px 20px #d4a83244;
  }
  .csx-btn-call:hover {
    background: linear-gradient(135deg, #d4a832, #ffe39a);
    box-shadow: 0 6px 30px #d4a83266;
    transform: translateY(-1px);
  }
  .csx-btn-wa {
    background: rgba(255,255,255,0.05);
    color: #f5d17a;
    border: 1px solid #d4a83240;
  }
  .csx-btn-wa:hover {
    background: rgba(212,168,50,0.1);
    border-color: #d4a832;
    box-shadow: 0 0 14px #d4a83222;
  }

  /* ── Emergency pulse tag ── */
  .csx-emergency-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(212,168,50,0.08);
    border: 1px solid #d4a83240;
    border-radius: 999px;
    padding: 3px 12px;
    margin-bottom: 8px;
  }
  .csx-red-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ef4444;
    display: inline-block;
    animation: csx-red-pulse 1.2s ease-in-out infinite;
  }
  @keyframes csx-red-pulse {
    0%, 100% { box-shadow: 0 0 4px #ef4444; }
    50%       { box-shadow: 0 0 12px #ef4444, 0 0 20px #ef444444; }
  }
  .csx-emergency-tag .csx-etag-text {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f87171;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
  }
</style>
